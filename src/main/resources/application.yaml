spring:
  application:
    name: coachly-api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.aredegalli.it/realms/coachly
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: users-service
              uri: http://coachly-users-be:8081
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1
                - RemoveRequestHeader=Cookie
                - UserContextHeaders

            - id: workouts-service
              uri: http://coachly-workouts-be:8082
              predicates:
                - Path=/api/workouts/**
              filters:
                - StripPrefix=1
                - RemoveRequestHeader=Cookie
                - UserContextHeaders

            - id: exercises-service
              uri: http://coachly-exercises-be:8083
              predicates:
                - Path=/api/exercises/**
              filters:
                - StripPrefix=1
                - RemoveRequestHeader=Cookie
                - UserContextHeaders

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
