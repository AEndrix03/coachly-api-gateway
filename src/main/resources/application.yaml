spring:
  application:
    name: coachly-api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://auth.aredegalli.it/realms/coachly-app}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: users-service
              uri: ${USERS_SERVICE_URI:http://coachly-users-be:8080}
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1
                - RemoveRequestHeader=Cookie
                - UserContextHeaders

            - id: workouts-service
              uri: ${WORKOUTS_SERVICE_URI:http://coachly-workouts-be:8080}
              predicates:
                - Path=/api/workouts/**
              filters:
                - StripPrefix=1
                - RemoveRequestHeader=Cookie
                - UserContextHeaders

            - id: exercises-service
              uri: ${EXERCISES_SERVICE_URI:http://coachly-exercises-be:8080}
              predicates:
                - Path=/api/exercises/**
              filters:
                - StripPrefix=1
                - RemoveRequestHeader=Cookie
                - UserContextHeaders

server:
  address: 0.0.0.0
  port: ${SERVER_PORT:8443}
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: ${COACHLY_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
  compression:
    enabled: true
  http2:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator

coachly:
  services:
    users:
      url: ${USERS_SERVICE_URI:http://coachly-users-be:8080}
      cache:
        user-id-ttl: 5m
        maximum-size: 10000
  security:
    cors:
      allowed-origins: ${COACHLY_CORS_ALLOWED_ORIGINS:*}
      allowed-methods: ${COACHLY_CORS_ALLOWED_METHODS:*}
      allowed-headers: ${COACHLY_CORS_ALLOWED_HEADERS:*}
      allow-credentials: ${COACHLY_CORS_ALLOW_CREDENTIALS:false}
      max-age: ${COACHLY_CORS_MAX_AGE:3600}
